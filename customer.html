<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mart PK | Premium Dark Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981;
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-body); color: var(--text-main); scroll-behavior: smooth; }

        .navbar { background: #1e293b; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.6rem; font-weight: bold; color: var(--primary); }
        .cart-icon { position: relative; cursor: pointer; font-size: 1.7rem; color: var(--text-main); }
        .cart-count { position: absolute; top: -8px; right: -12px; background: var(--primary); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }

        .search-bar input { width: 100%; padding: 14px 20px; border-radius: 1rem; border: 1px solid var(--border); background: var(--bg-card); color: white; margin-bottom: 2rem; outline: none; font-size: 1rem; }
        .search-bar input:focus { border-color: var(--primary); }

        .products-grid { display: grid; gap: 1.8rem; }
        @media (min-width: 1024px) { .products-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 640px) and (max-width: 1023px) { .products-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 639px) { .products-grid { grid-template-columns: 1fr; } }

        .product-card { background: var(--bg-card); border-radius: 1rem; overflow: hidden; border: 1px solid var(--border); transition: all 0.3s ease; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .product-img { width: 100%; height: 220px; object-fit: cover; border-bottom: 1px solid var(--border); background: #0f172a; }
        .product-info { padding: 1.2rem; flex: 1; display: flex; flex-direction: column; }
        .product-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; }
        .product-desc { font-size: 0.85rem; color: var(--text-muted); margin: 8px 0; line-height: 1.4; }
        .see-more-btn { background: none; border: none; color: var(--primary); font-size: 0.75rem; cursor: pointer; font-weight: 600; padding: 0; margin-top: 4px; text-align: left; display: inline-block; }
        .market-price { font-weight: 800; color: var(--primary); font-size: 1.3rem; margin: 12px 0 10px; }
        .add-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .add-btn:hover { background: #0d9668; }

        .cart-overlay { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100%; background: var(--bg-card); z-index: 1001; transition: 0.35s ease-out; box-shadow: -5px 0 20px rgba(0,0,0,0.6); overflow-y: auto; padding: 2rem; }
        .cart-overlay.active { right: 0; }
        .close-cart { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; float: right; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); }
        .qty-btn { background: #334155; border: none; color: white; width: 28px; height: 28px; border-radius: 6px; cursor: pointer; }
        .checkout-input, .city-datalist { width: 100%; padding: 12px; background: var(--bg-body); border: 1px solid var(--border); color: white; border-radius: 0.75rem; margin-bottom: 12px; outline: none; }
        .order-btn { background: var(--primary); color: white; width: 100%; padding: 16px; border-radius: 1rem; font-weight: bold; border: none; cursor: pointer; margin-top: 15px; font-size: 1rem; }
        .clear-cart-btn { background: #dc2626; color: white; border: none; padding: 8px 12px; border-radius: 0.5rem; cursor: pointer; margin-bottom: 10px; width: 100%; font-weight: bold; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); max-width: 500px; width: 90%; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid var(--primary); position: relative; }
        .modal-content h3 { color: var(--primary); margin-bottom: 1rem; }
        .modal-content p { color: var(--text-muted); line-height: 1.6; white-space: pre-wrap; }
        .close-modal { position: absolute; top: 12px; right: 18px; font-size: 1.8rem; cursor: pointer; color: var(--text-muted); }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 12px 24px; border-radius: 2rem; z-index: 2000; display: none; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">🛒 Mart PK</div>
    <div class="cart-icon" onclick="toggleCart()">
        <i class="fas fa-shopping-bag"></i><span id="cartCount" class="cart-count">0</span>
    </div>
</div>

<div class="container">
    <div class="search-bar"><input type="text" id="searchInput" placeholder="🔍 Search products..."></div>
    <div id="productsGrid" class="products-grid"><div style="text-align:center; padding:3rem;">Loading products...</div></div>
</div>

<div id="cartDrawer" class="cart-overlay">
    <button class="close-cart" onclick="toggleCart()">&times;</button>
    <h3 style="margin-bottom: 20px;"><i class="fas fa-shopping-basket"></i> Your Basket</h3>
    <button id="clearCartBtn" class="clear-cart-btn"><i class="fas fa-trash-alt"></i> Clear Cart</button>
    <div id="cartItemsList"></div>
    <div style="margin:20px 0; font-size:1.1rem; display:flex; justify-content:space-between; border-top:1px solid var(--border); padding-top:15px;">
        <span>Subtotal:</span> <strong>Rs. <span id="cartSubtotal">0</span></strong>
    </div>
    <div style="background:rgba(16,185,129,0.1); padding:15px; border-radius:12px; margin-bottom:20px;">
        <label style="font-size:0.8rem; color:var(--primary)">📍 Select City</label>
        <input list="citiesList" id="deliveryCityInput" class="city-datalist" placeholder="Search your city">
        <datalist id="citiesList"></datalist>
        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-top:8px;">
            <span>Delivery Fee:</span> <span>Rs. <span id="deliveryFee">0</span></span>
        </div>
        <div style="display:flex; justify-content:space-between; font-size:1.3rem; margin-top:12px; color:var(--primary); font-weight:bold;">
            <span>Total:</span> <span>Rs. <span id="totalAmount">0</span></span>
        </div>
    </div>
    <h4>📦 Shipping Details</h4>
    <input type="text" id="fullName" class="checkout-input" placeholder="Full Name *">
    <input type="tel" id="phone" class="checkout-input" placeholder="WhatsApp Number *">
    <input type="text" id="streetArea" class="checkout-input" placeholder="Street / Area Name *">
    <textarea id="address" rows="2" class="checkout-input" placeholder="Complete House Address *"></textarea>
    <button id="placeOrderBtn" class="order-btn">✅ Confirm Order (Cash on Delivery)</button>
</div>

<div id="descModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle">Description</h3>
        <p id="modalDesc"></p>
    </div>
</div>

<div id="toastMsg" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://mart-c4baa-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const POSTEX_TOKEN = "YmU3Nzg4Y2Y1YzAzNDc3YzgxMzdlMzA0Yjc1MGNjMDk6Y2IzM2ViZTI2NGE4NDVhNTlmYzczOGY3Njg2OTA4Y2Y=";
    const ADMIN_WHATSAPP = "923125540048";
    const ADMIN_EMAIL = "ullahyad199@gmail.com";

    let products = [];
    let cart = [];

    if(!localStorage.getItem('cartClearedFlag')) {
        localStorage.removeItem('martCart');
        localStorage.setItem('cartClearedFlag', 'true');
    } else {
        let saved = localStorage.getItem('martCart');
        if(saved) cart = JSON.parse(saved);
    }

    let deliveryCharge = 0;

    function toggleCart() { document.getElementById('cartDrawer').classList.toggle('active'); }
    function showToast(msg) { let t = document.getElementById('toastMsg'); t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
    function closeModal() { document.getElementById('descModal').style.display = 'none'; }

    window.showDescription = function(title, desc) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalDesc').innerText = desc || "No description added yet.";
        document.getElementById('descModal').style.display = 'flex';
    };

    async function loadCitiesForCustomer() {
        const datalist = document.getElementById('citiesList');
        try {
            const response = await fetch("https://api.postex.pk/services/integration/api/order/v1/get-operational-city", {
                headers: { "token": POSTEX_TOKEN, "Content-Type": "application/json" }
            });
            const result = await response.json();
            let rawCities = [];
            if (Array.isArray(result)) rawCities = result;
            else if (result.dist && Array.isArray(result.dist)) rawCities = result.dist;
            else if (result.data && Array.isArray(result.data)) rawCities = result.data;
            window.allOperationalCities = rawCities.map(item => (typeof item === 'object' ? (item.cityName || item.name || item.operationalCityName) : item)).filter(Boolean).sort();
            if (datalist) datalist.innerHTML = window.allOperationalCities.map(city => `<option value="${city}">`).join('');
        } catch (e) { console.error("City API error:", e); }
    }

    // ✅ FIXED DELIVERY CHARGE LOGIC
    function calculateDeliveryCharge() {
        const cityInput = document.getElementById('deliveryCityInput').value;
        const totalWeight = cart.reduce((s, i) => s + ((i.weight || 0) * i.qty), 0);
        if (!cityInput || totalWeight === 0) { 
            deliveryCharge = 0; 
        } else {
            if (totalWeight <= 0.5) deliveryCharge = 190;
            else if (totalWeight <= 1) deliveryCharge = 240;
            else if (totalWeight <= 3) deliveryCharge = 330;
            else if (totalWeight <= 5) deliveryCharge = 500;
            else {
                // Above 5 KG: base 500 + extra kg * 110
                let extraKg = Math.ceil(totalWeight - 5);
                deliveryCharge = 500 + (extraKg * 110);
            }
        }
        updateTotal();
    }

    function updateTotal() {
        const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);
        document.getElementById('cartSubtotal').innerText = subtotal.toLocaleString();
        document.getElementById('deliveryFee').innerText = deliveryCharge.toLocaleString();
        document.getElementById('totalAmount').innerText = (subtotal + deliveryCharge).toLocaleString();
        document.getElementById('cartCount').innerText = cart.reduce((s, i) => s + i.qty, 0);
    }

    async function loadData() {
        const prodSnap = await db.ref('products').once('value');
        if (prodSnap.val()) products = Object.entries(prodSnap.val()).map(([key, val]) => ({ ...val, firebaseId: key }));
        renderProducts();
        renderCart();
        updateTotal();
    }

    function getProductDescription(product) {
        return product.description || product.desc || product.productDescription || product.details || '';
    }

    function renderProducts() {
        const grid = document.getElementById('productsGrid');
        if (!products.length) { grid.innerHTML = '<div style="text-align:center;">No products found.</div>'; return; }
        grid.innerHTML = products.map(p => {
            const fullDesc = getProductDescription(p);
            const shortDesc = fullDesc ? (fullDesc.length > 80 ? fullDesc.substring(0, 80) + '...' : fullDesc) : 'No description added yet.';
            const displayDesc = fullDesc ? shortDesc : 'No description added yet.';
            return `
                <div class="product-card" data-name="${escapeHtml(p.name || 'Unnamed')}">
                    <img class="product-img" src="${p.images?.[0] || 'https://via.placeholder.com/300?text=No+Image'}" alt="${p.name}" loading="lazy">
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(p.name || 'Unnamed')}</div>
                        <div class="product-desc">
                            ${escapeHtml(displayDesc)}
                            ${fullDesc ? `<button class="see-more-btn" data-title="${escapeHtml(p.name)}" data-desc="${escapeHtml(fullDesc)}">See More</button>` : ''}
                        </div>
                        <div class="market-price">₨ ${Number(p.marketPrice).toLocaleString()}</div>
                        <button class="add-btn" data-id="${p.firebaseId}">Add to Bag</button>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.see-more-btn').forEach(btn => {
            btn.removeEventListener('click', handleSeeMore);
            btn.addEventListener('click', handleSeeMore);
        });
        document.querySelectorAll('.add-btn').forEach(btn => {
            btn.removeEventListener('click', handleAddToCart);
            btn.addEventListener('click', handleAddToCart);
        });
    }

    function handleSeeMore(e) {
        const title = e.currentTarget.getAttribute('data-title');
        const desc = e.currentTarget.getAttribute('data-desc');
        showDescription(title, desc);
    }

    function handleAddToCart(e) {
        const pid = e.currentTarget.getAttribute('data-id');
        addToCart(pid);
    }

    function escapeHtml(str) {
        if(!str) return '';
        return str.replace(/[&<>]/g, function(m){
            if(m==='&') return '&amp;';
            if(m==='<') return '&lt;';
            if(m==='>') return '&gt;';
            return m;
        }).replace(/[\n\r]/g, ' ');
    }

    function addToCart(pid) {
        const p = products.find(x => x.firebaseId === pid);
        if (!p) return;
        const ex = cart.find(i => i.id === pid);
        if (ex) ex.qty++;
        else cart.push({ id: pid, name: p.name, price: Number(p.marketPrice), weight: Number(p.weight) || 0, qty: 1 });
        saveCart();
        showToast("✓ Added to bag!");
    }

    function renderCart() {
        const list = document.getElementById('cartItemsList');
        if (!cart.length) { list.innerHTML = '<div style="text-align:center;padding:2rem;">Cart is empty</div>'; return; }
        list.innerHTML = cart.map((item, i) => `
            <div class="cart-item">
                <div style="flex:1"><strong>${escapeHtml(item.name)}</strong><br><small>₨ ${item.price}</small></div>
                <div>
                    <button class="qty-btn" data-index="${i}" data-delta="-1">-</button>
                    <span style="margin:0 12px">${item.qty}</span>
                    <button class="qty-btn" data-index="${i}" data-delta="1">+</button>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.qty-btn').forEach(btn => {
            btn.removeEventListener('click', handleQty);
            btn.addEventListener('click', handleQty);
        });
    }

    function handleQty(e) {
        const idx = parseInt(e.currentTarget.getAttribute('data-index'));
        const delta = parseInt(e.currentTarget.getAttribute('data-delta'));
        updateQty(idx, delta);
    }

    function updateQty(idx, delta) {
        cart[idx].qty += delta;
        if (cart[idx].qty <= 0) cart.splice(idx, 1);
        saveCart();
    }

    function clearCart() {
        if(confirm("Remove all items from cart?")) {
            cart = [];
            saveCart();
            showToast("Cart cleared");
        }
    }

    function saveCart() {
        localStorage.setItem('martCart', JSON.stringify(cart));
        renderCart();
        calculateDeliveryCharge();
    }

    async function placeOrder() {
        const name = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const street = document.getElementById('streetArea').value.trim();
        const city = document.getElementById('deliveryCityInput').value.trim();
        const addr = document.getElementById('address').value.trim();

        if (!name || !phone || !street || !city || cart.length === 0) {
            alert("❌ Please fill all fields and add items.");
            return;
        }
        if (!phone.match(/^[0-9]{10,13}$/)) { alert("Enter valid phone number (e.g., 03123456789)"); return; }

        const subtotal = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
        const total = subtotal + deliveryCharge;
        const itemsList = cart.map(i => `${i.name} (x${i.qty})`).join(', ');
        const orderDate = new Date().toLocaleString();

        const orderData = {
            customerName: name,
            customerPhone: phone,
            city: city,
            address: `${street}, ${addr}`,
            cartItems: cart.map(item => ({ name: item.name, price: item.price, qty: item.qty, weight: item.weight })),
            totalAmount: total,
            status: 'Pending',
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        const waMsg = `*🛍️ NEW ORDER - MART PK*%0A----------------------%0A*Name:* ${name}%0A*Phone:* ${phone}%0A*City:* ${city}%0A*Address:* ${street}, ${addr}%0A*Items:* ${itemsList}%0A*Total:* Rs. ${total}%0A*Date:* ${orderDate}`;
        
        const emailData = {
            name: name,
            phone: phone,
            city: city,
            address: `${street}, ${addr}`,
            items: itemsList,
            total: `Rs. ${total}`,
            _subject: `🛒 New Mart PK Order from ${name}`,
            _template: "table"
        };

        try {
            await db.ref('pendingOrders').push(orderData);
            window.open(`https://wa.me/${ADMIN_WHATSAPP}?text=${waMsg}`, '_blank');
            await fetch('https://formsubmit.co/ajax/' + ADMIN_EMAIL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify(emailData)
            });
            showToast("✅ Order placed! Check WhatsApp & Email.");
            cart = [];
            saveCart();
            setTimeout(() => location.reload(), 1500);
        } catch (err) {
            console.error(err);
            alert("Order failed. Please try again.");
        }
    }

    document.getElementById('placeOrderBtn').onclick = placeOrder;
    document.getElementById('deliveryCityInput').onchange = calculateDeliveryCharge;
    document.getElementById('clearCartBtn').onclick = clearCart;
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            const name = card.getAttribute('data-name') || '';
            card.style.display = name.includes(term) ? 'flex' : 'none';
        });
    });
    window.onclick = (e) => { if (e.target === document.getElementById('descModal')) closeModal(); };

    loadData();
    loadCitiesForCustomer();
</script>
</body>
</html>
