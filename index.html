<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mart PK | Premium Wholesale Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --gold:#d4a017; --gold-light:#f5c842; --dark:#0f1923; --dark2:#1a2535;
            --green:#1a6b42; --bg:#f4f6f0; --card:#ffffff; --text:#1a2535;
            --muted:#64748b; --border:#e2e8f0; --red:#dc2626; --shadow:0 8px 25px rgba(0,0,0,0.08);
            --radius:1.2rem;
        }
        body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);}
        .hero{
            background:linear-gradient(135deg,var(--dark),var(--dark2) 60%,var(--green));
            padding:1.8rem 1.2rem 2.5rem;text-align:center;
        }
        .hero h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.8rem);color:white;}
        .hero h1 span{color:var(--gold-light);}
        .unlock-card{
            max-width:400px;margin:1rem auto 0;background:rgba(255,255,255,0.1);backdrop-filter:blur(12px);
            border-radius:2rem;padding:1rem;border:1px solid rgba(255,255,255,0.2);
        }
        .unlock-row{display:flex;gap:8px;}
        .unlock-row input{flex:1;padding:10px 16px;border-radius:60px;border:none;background:rgba(255,255,255,0.15);color:white;outline:none;}
        .unlock-row input::placeholder{color:rgba(255,255,255,0.5);}
        .unlock-btn{background:var(--gold);border:none;padding:0 20px;border-radius:60px;font-weight:bold;cursor:pointer;}
        .unlock-success{margin-top:8px;color:#86efac;font-size:0.8rem;}
        .main{max-width:1300px;margin:0 auto;padding:1.5rem 1rem;}
        .section-title{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
        .search-wrap{position:relative;margin-bottom:1.5rem;}
        .search-input{width:100%;padding:12px 20px 12px 45px;border-radius:60px;border:2px solid var(--border);font-size:0.9rem;background:white;}
        .search-input:focus{border-color:var(--gold);outline:none;}
        .search-wrap i{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--muted);}
        .search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:#e2e8f0;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;display:none;}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;}
        .product-card{background:white;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform 0.2s;border:1px solid transparent;}
        .product-card:hover{transform:translateY(-3px);border-color:var(--gold);}
        .gallery-wrap{position:relative;height:220px;background:#eef2f3;overflow:hidden;}
        .slides-track{display:flex;height:100%;transition:transform 0.3s ease;}
        .slides-track img{min-width:100%;height:100%;object-fit:cover;flex-shrink:0;}
        .gallery-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);border:none;color:white;width:30px;height:30px;border-radius:50%;cursor:pointer;z-index:5;}
        .gallery-btn.prev{left:6px;}
        .gallery-btn.next{right:6px;}
        .gallery-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:5;}
        .gallery-dots span{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.6);}
        .gallery-dots span.active{background:var(--gold);width:14px;border-radius:4px;}
        .product-details{padding:1rem;}
        .product-title{font-weight:800;font-size:1rem;margin-bottom:0.3rem;}
        .desc-box{background:#f8fafc;border-radius:0.7rem;padding:0.5rem 0.7rem;font-size:0.75rem;color:var(--muted);margin:0.5rem 0;display:flex;justify-content:space-between;align-items:center;}
        .copy-btn{background:#e2e8f0;border:none;padding:3px 10px;border-radius:30px;font-size:0.65rem;cursor:pointer;}
        .price-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;}
        .market-price{font-size:1rem;color:var(--red);text-decoration:line-through;}
        .special-box{background:#fef9e7;border-radius:0.8rem;padding:0.6rem;text-align:center;margin:0.5rem 0;}
        .reveal-btn{background:var(--gold);border:none;width:100%;padding:7px;border-radius:40px;font-weight:bold;cursor:pointer;}
        .special-price-show{font-weight:800;color:var(--green);font-size:1rem;}
        .location-badge{font-size:0.7rem;color:var(--blue);background:#dbeafe;display:inline-block;padding:3px 10px;border-radius:30px;margin:4px 0;}
        .action-row{display:flex;gap:6px;margin-top:6px;}
        .action-btn{flex:1;background:var(--dark);color:white;border:none;padding:7px 0;border-radius:40px;font-size:0.7rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;}
        .action-btn.whatsapp{background:#25d366;}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:white;padding:8px 20px;border-radius:40px;font-size:0.8rem;opacity:0;transition:0.2s;z-index:999;pointer-events:none;}
        .toast.show{opacity:1;}
        .skeleton-img{height:220px;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1s infinite;}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        .skeleton-line{height:12px;background:#e2e8f0;margin:6px 0;border-radius:6px;}
        .empty-state{grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted);}
        @media (max-width:640px){.products-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
<div class="hero">
    <h1>Mart <span>PK</span></h1>
    <div class="unlock-card">
        <div class="unlock-row"><input type="password" id="passInput" placeholder="Wholesale password"><button class="unlock-btn" id="unlockBtn"><i class="fas fa-key"></i> Unlock</button></div>
        <div id="unlockStatus"></div>
    </div>
</div>
<div class="main">
    <div class="section-title"><i class="fas fa-boxes" style="color:var(--gold)"></i> Our Products</div>
    <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="searchInput" class="search-input" placeholder="Search name or description..."><button class="search-clear" id="searchClear"><i class="fas fa-times"></i></button></div>
    <div id="productsGrid" class="products-grid"></div>
</div>
<div class="toast" id="toast"></div>

<script>
    const DB_URL = "https://mart-c4baa-default-rtdb.firebaseio.com/";
    const FIXED_PASSWORD = "786";
    let globalUnlocked = false;
    let productsCache = null; // cache products after load
    let galleryState = {};

    async function fetchProducts() {
        const res = await fetch(`${DB_URL}products.json`);
        if(!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
    }

    function processImages(images) {
        if(!images || !images.length) return ['https://placehold.co/400x220?text=No+Image'];
        return images.map(img => {
            if(typeof img === 'string' && img.includes('drive.google.com')){
                let match = img.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                if(match) return `https://lh3.googleusercontent.com/d/${match[1]}`;
            }
            return img;
        });
    }

    async function renderProducts() {
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = Array(6).fill(0).map(()=>`<div class="product-card"><div class="skeleton-img"></div><div class="product-details"><div class="skeleton-line" style="width:70%"></div><div class="skeleton-line" style="width:50%"></div><div class="skeleton-line" style="width:60%"></div></div></div>`).join('');
        try{
            const data = await fetchProducts();
            if(!data || Object.keys(data).length===0){ grid.innerHTML='<div class="empty-state"><i class="fas fa-box-open fa-2x"></i><p>No products yet.</p></div>'; return; }
            let entries = Object.entries(data);
            // sort by id (numeric)
            entries.sort((a,b)=> (a[1].id||0) - (b[1].id||0));
            productsCache = entries;
            grid.innerHTML = '';
            for(let [key, prod] of entries){
                let images = processImages(prod.images || []);
                let cardId = key;
                let specialHtml = globalUnlocked ? `<div class="special-price-show"><i class="fas fa-tags"></i> Wholesale: Rs. ${Number(prod.specialPrice).toLocaleString()}</div>` : `<button class="reveal-btn" data-id="${key}"><i class="fas fa-lock"></i> Tap to see wholesale price</button>`;
                let galleryHtml = buildGallery(cardId, images);
                let cardDiv = document.createElement('div');
                cardDiv.className = 'product-card';
                cardDiv.setAttribute('data-name', (prod.name||'').toLowerCase());
                cardDiv.setAttribute('data-desc', (prod.desc||'').toLowerCase());
                cardDiv.innerHTML = `
                    ${galleryHtml}
                    <div class="product-details">
                        <div class="product-title">${escapeHtml(prod.name||'Product')}</div>
                        <div class="desc-box"><span>${escapeHtml((prod.desc||'Premium quality').substring(0,80))}</span><button class="copy-btn" onclick="copyText('${escapeAttr(prod.desc||'')}')"><i class="far fa-copy"></i></button></div>
                        <div class="price-row"><span class="market-price">Market: Rs. ${Number(prod.marketPrice).toLocaleString()}</span></div>
                        ${prod.location? `<div class="location-badge"><i class="fas fa-map-marker-alt"></i> Pickup: ${escapeHtml(prod.location)}</div>` : ''}
                        <div class="special-box" id="sbox-${key}">${specialHtml}</div>
                        <div class="action-row">
                            <button class="action-btn" onclick="downloadCurrent('${key}',${JSON.stringify(images).replace(/"/g,'&quot;')})"><i class="fas fa-download"></i> Save</button>
                            <button class="action-btn" onclick="downloadAllZip('${key}','${escapeAttr(prod.name)}',${JSON.stringify(images).replace(/"/g,'&quot;')})"><i class="fas fa-images"></i> All</button>
                            <button class="action-btn whatsapp" onclick="shareWhatsApp('${escapeAttr(prod.name)}','${prod.marketPrice}')"><i class="fab fa-whatsapp"></i></button>
                        </div>
                    </div>
                `;
                grid.appendChild(cardDiv);
            }
            attachRevealEvents();
            initGalleries();
            initSearch();
        } catch(e){
            grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Firebase error: ${e.message}<br>Set rules: {".read":true}</p></div>`;
        }
    }

    function buildGallery(cardId, images){
        if(!images.length) images = ['https://placehold.co/400x220?text=No+Image'];
        let slides = images.map((img,i)=>`<img src="${img}" alt="product" loading="${i===0?'eager':'lazy'}" onerror="this.src='https://placehold.co/400x220?text=Error'">`).join('');
        let dots = images.map((_,i)=>`<span class="${i===0?'active':''}" data-gallery="${cardId}" data-idx="${i}"></span>`).join('');
        let nav = images.length>1 ? `<button class="gallery-btn prev" data-gallery="${cardId}"><i class="fas fa-chevron-left"></i></button><button class="gallery-btn next" data-gallery="${cardId}"><i class="fas fa-chevron-right"></i></button><div class="gallery-dots">${dots}</div>` : '';
        return `<div class="gallery-wrap" data-gallerywrap="${cardId}"><div class="slides-track" id="track-${cardId}">${slides}</div>${nav}</div>`;
    }

    function initGalleries(){
        document.querySelectorAll('.gallery-wrap').forEach(wrap=>{
            let id = wrap.dataset.gallerywrap;
            let track = document.getElementById(`track-${id}`);
            if(!track) return;
            let slides = track.children;
            if(slides.length<=1) return;
            let current = 0;
            galleryState[id] = 0;
            let prevBtn = wrap.querySelector('.gallery-btn.prev');
            let nextBtn = wrap.querySelector('.gallery-btn.next');
            let dots = wrap.querySelectorAll('.gallery-dots span');
            function goTo(n){
                current = (n+slides.length)%slides.length;
                galleryState[id] = current;
                track.style.transform = `translateX(-${current*100}%)`;
                dots.forEach((d,i)=>d.classList.toggle('active',i===current));
            }
            if(prevBtn) prevBtn.onclick = ()=>goTo(current-1);
            if(nextBtn) nextBtn.onclick = ()=>goTo(current+1);
            dots.forEach(dot=>{ dot.onclick = ()=>goTo(parseInt(dot.dataset.idx)); });
            let startX=0;
            track.addEventListener('touchstart', e=>{ startX = e.touches[0].clientX; },{passive:true});
            track.addEventListener('touchend', e=>{ let diff = startX - e.changedTouches[0].clientX; if(Math.abs(diff)>40) goTo(diff>0?current+1:current-1); },{passive:true});
        });
    }

    function attachRevealEvents(){
        document.querySelectorAll('.reveal-btn').forEach(btn=>{
            btn.onclick = (e)=>{
                let pass = document.getElementById('passInput').value;
                if(pass === FIXED_PASSWORD){
                    globalUnlocked = true;
                    document.getElementById('unlockStatus').innerHTML = '<div class="unlock-success"><i class="fas fa-check-circle"></i> Wholesale prices unlocked!</div>';
                    renderProducts();
                } else { showToast('❌ Wrong password!'); }
            };
        });
    }

    async function downloadCurrent(cardId, imagesArr){
        let idx = galleryState[cardId] || 0;
        let imgUrl = imagesArr[idx];
        if(!imgUrl){ showToast('No image'); return; }
        try{
            let btn = event.target.closest('.action-btn');
            if(btn) btn.disabled=true;
            let res = await fetch(imgUrl,{mode:'cors'});
            let blob = await res.blob();
            let url = URL.createObjectURL(blob);
            let a = document.createElement('a');
            a.href = url; a.download = `image_${Date.now()}.jpg`;
            a.click(); URL.revokeObjectURL(url);
            showToast('✅ Downloaded');
        } catch(e){ showToast('Download failed'); }
        finally{ if(btn) btn.disabled=false; }
    }

    async function downloadAllZip(cardId, name, imagesArr){
        if(!imagesArr.length){ showToast('No images'); return; }
        let btn = event.target.closest('.action-btn');
        if(btn) btn.disabled=true;
        try{
            let zip = new JSZip();
            let valid = 0;
            for(let i=0;i<imagesArr.length;i++){
                let resp = await fetch(imagesArr[i],{mode:'cors'}).catch(()=>null);
                if(resp && resp.ok){
                    let blob = await resp.blob();
                    zip.file(`${name.replace(/[^a-z0-9]/gi,'-')}_${i+1}.jpg`, blob);
                    valid++;
                }
            }
            if(valid===0){ showToast('No images could be fetched'); return; }
            let content = await zip.generateAsync({type:'blob'});
            let url = URL.createObjectURL(content);
            let a = document.createElement('a');
            a.href = url; a.download = `${name.replace(/[^a-z0-9]/gi,'-')}_images.zip`;
            a.click(); URL.revokeObjectURL(url);
            showToast(`✅ ${valid} images zipped`);
        } catch(e){ showToast('ZIP failed'); }
        finally{ if(btn) btn.disabled=false; }
    }

    function shareWhatsApp(name, price){ window.open(`https://wa.me/?text=${encodeURIComponent(`*${name}*\nMarket Price: Rs. ${price}\nFrom Mart PK`)}`,'_blank'); }
    function copyText(txt){ navigator.clipboard.writeText(txt); showToast('Copied!'); }
    function showToast(msg){ let t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
    function escapeHtml(str){ if(!str)return ''; return String(str).replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}); }
    function escapeAttr(str){ return String(str||'').replace(/["']/g, ''); }

    function initSearch(){
        let input = document.getElementById('searchInput');
        let clear = document.getElementById('searchClear');
        if(!input) return;
        input.oninput = ()=>{
            let q = input.value.trim().toLowerCase();
            clear.style.display = q ? 'flex' : 'none';
            let cards = document.querySelectorAll('.product-card');
            let visible=0;
            cards.forEach(card=>{
                let name = card.getAttribute('data-name') || '';
                let desc = card.getAttribute('data-desc') || '';
                let match = name.includes(q) || desc.includes(q);
                card.style.display = match ? 'block' : 'none';
                if(match) visible++;
            });
            let noMsg = document.getElementById('noResultsMsg');
            if(q && visible===0 && !noMsg){
                let div = document.createElement('div'); div.id='noResultsMsg'; div.className='empty-state'; div.innerHTML='<i class="fas fa-search"></i><p>No matching products</p>';
                document.getElementById('productsGrid').appendChild(div);
            } else if(noMsg && (visible>0 || !q)) noMsg.remove();
        };
        clear.onclick = ()=>{ input.value=''; input.dispatchEvent(new Event('input')); input.focus(); };
    }

    document.getElementById('unlockBtn').addEventListener('click',()=>{ let pass=document.getElementById('passInput').value; if(pass===FIXED_PASSWORD){ globalUnlocked=true; document.getElementById('unlockStatus').innerHTML='<div class="unlock-success">✅ Wholesale unlocked</div>'; renderProducts(); } else showToast('Wrong password'); });
    document.getElementById('passInput').addEventListener('keypress',e=>{ if(e.key==='Enter') document.getElementById('unlockBtn').click(); });
    renderProducts();
</script>
</body>
</html>
