
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mart PK | Admin Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #eab308;
            --whatsapp: #25d366;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
        }

        *{margin:0;padding:0;box-sizing:border-box;}
        body{background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text-main); line-height: 1.6;}
        
        .navbar{background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        .container{max-width: 1300px; margin: 2rem auto; padding: 0 1rem;}
        .grid{display: grid; grid-template-columns: 380px 1fr; gap: 2rem;}
        @media (max-width: 900px){ .grid{grid-template-columns: 1fr;} }

        .card{background: var(--card-bg); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;}
        .card h3{margin-bottom: 1.2rem; font-size: 1.1rem; color: var(--primary); display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px;}
        
        input, select, textarea { width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; }
        
        .btn {
            padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: 500; 
            display: inline-flex; align-items: center; gap: 6px; text-decoration: none; transition: 0.3s;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--accent); color: var(--primary); }
        .btn-wa { background: var(--whatsapp); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-sm { padding: 6px 12px; font-size: 12px; }

        .list-container { max-height: 400px; overflow-y: auto; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        
        .toast{position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; padding: 12px 25px; border-radius: 8px; display: none; z-index: 1000;}
    </style>
</head>
<body>

<div class="navbar">
    <div class="brand"><i class="fas fa-tasks"></i> Mart PK | Management Hub</div>
    <div id="stats"><i class="fas fa-box"></i> <span id="productCount">0</span> Products</div>
</div>

<div class="container">
    <div class="grid">
        <div class="sidebar">
            <div class="card">
                <h3><i class="fas fa-plus-circle"></i> Add Product</h3>
                <input type="text" id="prodName" placeholder="Product Name *">
                <textarea id="prodDesc" rows="2" placeholder="Description"></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <input type="number" id="marketPrice" placeholder="Price">
                    <input type="number" id="weight" step="0.1" placeholder="Weight (KG)">
                </div>
                <select id="categorySelect"><option value="">Category</option></select>
                
                <div id="imageUrls"></div>
                <button onclick="addImageField()" class="btn btn-sm btn-primary" style="width:100%; margin-bottom:10px;">+ Add Image Link</button>
                
                <button id="saveBtn" onclick="saveProduct()" class="btn btn-gold" style="width:100%;">
                    <i class="fas fa-save"></i> Save Product
                </button>
            </div>

            <div class="card">
                <h3><i class="fas fa-folder"></i> Categories</h3>
                <div style="display:flex; gap:5px; margin-bottom: 15px;">
                    <input type="text" id="newCategoryName" placeholder="New category..." style="margin-bottom:0;">
                    <button onclick="addCategory()" class="btn btn-sm btn-primary">Add</button>
                </div>
                <div id="categoriesList" class="list-container"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="card" style="border-left: 5px solid var(--accent);">
                 <h3><i class="fas fa-bell"></i> New Orders (WhatsApp/Email)</h3>
                 <div id="pendingOrdersList" class="list-container">Loading orders...</div>
            </div>

            <div class="card">
                <h3><i class="fas fa-boxes"></i> Inventory Management</h3>
                <div id="productsList" class="list-container"></div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://mart-c4baa-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [], imageUrls = [''];

    function showToast(msg){ 
        let t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block'; 
        setTimeout(() => t.style.display = 'none', 3000); 
    }

    // --- ORDER MANAGEMENT (MANUAL) ---
    function loadPendingOrders() {
        db.ref('pendingOrders').on('value', snap => {
            const data = snap.val();
            const container = document.getElementById('pendingOrdersList');
            if(!data) { container.innerHTML = '<p>No new orders.</p>'; return; }

            container.innerHTML = Object.entries(data).reverse().map(([key, o]) => {
                const itemsText = o.cartItems.map(i => `${i.name} (x${i.qty})`).join(', ');
                const totalWeight = o.cartItems.reduce((sum, i) => sum + (parseFloat(i.weight)||0)*(parseInt(i.qty)||1), 0);
                
                // Text for WhatsApp
                const msg = window.encodeURIComponent(`*New Order - Mart PK*\n\n*Name:* ${o.customerName}\n*Phone:* ${o.customerPhone}\n*Address:* ${o.address}, ${o.city}\n\n*Items:* ${itemsText}\n*Total Bill:* Rs. ${o.totalAmount}\n*Weight:* ${totalWeight.toFixed(2)} KG`);

                return `
                    <div class="item-row" style="background: #fffbeb; margin-bottom: 10px; border-radius: 8px;">
                        <div style="flex:1;">
                            <strong>${o.customerName}</strong> (${o.city})<br>
                            <small>${itemsText}</small>
                        </div>
                        <div style="display:flex; gap:8px;">
                            <a href="https://wa.me/${o.customerPhone}?text=${msg}" target="_blank" class="btn btn-sm btn-wa"><i class="fab fa-whatsapp"></i> WA</a>
                            <a href="mailto:?subject=Order Details&body=${msg}" class="btn btn-sm btn-primary"><i class="fas fa-envelope"></i> Email</a>
                            <button onclick="db.ref('pendingOrders/${key}').remove()" class="btn btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            }).join('');
        });
    }

    // --- PRODUCT MANAGEMENT ---
    async function saveProduct() {
        const data = {
            name: document.getElementById('prodName').value,
            description: document.getElementById('prodDesc').value,
            marketPrice: Number(document.getElementById('marketPrice').value),
            weight: parseFloat(document.getElementById('weight').value) || 0,
            categoryKey: document.getElementById('categorySelect').value,
            images: imageUrls.filter(u => u.trim()),
            updatedAt: firebase.database.ServerValue.TIMESTAMP
        };

        if(!data.name) return showToast("Name is required");

        await db.ref('products').push(data);
        showToast("Product Uploaded!");
        resetForm();
        loadProducts();
    }

    async function loadProducts(){
        const snap = await db.ref('products').once('value');
        const data = snap.val() || {};
        products = Object.entries(data).map(([k,v]) => ({key:k, ...v}));
        document.getElementById('productCount').innerText = products.length;
        document.getElementById('productsList').innerHTML = products.map(p => `
            <div class="item-row">
                <span>${p.name} - Rs.${p.marketPrice}</span>
                <button onclick="db.ref('products/${p.key}').remove();loadProducts();" class="btn btn-sm btn-danger">Delete</button>
            </div>
        `).join('');
    }

    // --- CATEGORY MANAGEMENT ---
    async function addCategory() {
        const name = document.getElementById('newCategoryName').value;
        if(name) {
            await db.ref('categories').push({name});
            document.getElementById('newCategoryName').value = '';
            loadCategories();
        }
    }

    async function loadCategories() {
        const snap = await db.ref('categories').once('value');
        const data = snap.val() || {};
        const cats = Object.entries(data);
        document.getElementById('categorySelect').innerHTML = '<option value="">Category</option>' + cats.map(([k,v]) => `<option value="${k}">${v.name}</option>`).join('');
        document.getElementById('categoriesList').innerHTML = cats.map(([k,v]) => `<div class="item-row"><span>${v.name}</span><button onclick="db.ref('categories/${k}').remove();loadCategories();" class="btn btn-sm btn-danger">X</button></div>`).join('');
    }

    function renderImageFields(){
        document.getElementById('imageUrls').innerHTML = imageUrls.map((u, i) => `<input type="text" value="${u}" onchange="imageUrls[${i}]=this.value" placeholder="Image URL">`).join('');
    }
    window.addImageField = () => { imageUrls.push(''); renderImageFields(); };
    function resetForm() { document.getElementById('prodName').value=''; document.getElementById('weight').value=''; imageUrls=['']; renderImageFields(); }

    // Init
    loadCategories();
    loadProducts();
    loadPendingOrders();
    renderImageFields();
</script>
</body>
</html>
